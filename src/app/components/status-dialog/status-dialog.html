<section class="status-dialog-card" [class.status-dialog-card--error]="data.variant === 'error'" aria-labelledby="status-dialog-title" aria-describedby="status-dialog-message">
  <div class="status-dialog-header">
    <div class="status-dialog-icon-wrapper" [class.status-dialog-icon-wrapper--error]="data.variant === 'error'">
      <mat-icon class="status-dialog-icon">{{ data.variant === 'success' ? 'check_circle' : 'error' }}</mat-icon>
    </div>
    <h2 id="status-dialog-title" class="status-dialog-title">{{ data.title }}</h2>
  </div>

  <div class="status-dialog-body">
    <p id="status-dialog-message" class="status-dialog-message">{{ data.message }}</p>
  </div>

  <div class="status-dialog-footer">
    <button type="button" class="status-dialog-button" [mat-dialog-close]="true">
      {{ data.actionLabel || 'OK' }}
    </button>
  </div>
</section>
