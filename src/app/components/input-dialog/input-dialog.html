<form [formGroup]="form" (ngSubmit)="submit()" class="dialog-card">
  <div class="dialog-card-header">
    <h2 class="dialog-card-title">
      {{ data?.mode === 'edit'
        ? (data?.type === 'income' ? 'Edit Income' : 'Edit Transaction')
        : (data?.type === 'income' ? 'Add Income' : 'Add Transaction') }}
    </h2>
  </div>

  <div class="dialog-card-body">
    @if (data?.type === 'income') {
      <mat-form-field appearance="outline" class="dialog-input-field">
        <mat-label>Name</mat-label>
        <input matInput placeholder="Name" [formControl]="form.controls.name">
      </mat-form-field>

      <mat-form-field appearance="outline" class="dialog-input-field">
        <mat-label>Nominal</mat-label>
        <input matInput placeholder="Nominal" [formControl]="form.controls.nominal" type="number">
      </mat-form-field>

      <mat-form-field appearance="outline" class="dialog-input-field">
        <mat-label>Choose a date</mat-label>
        <input matInput [matDatepicker]="picker" [formControl]="form.controls.transfer_date">
        <mat-hint>MM/DD/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker">
          <mat-icon matDatepickerToggleIcon>keyboard_arrow_down</mat-icon>
        </mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
    } @else {
      <mat-form-field appearance="outline" class="dialog-input-field">
        <mat-label>Nominal</mat-label>
        <input matInput placeholder="Nominal" [formControl]="form.controls.nominal" type="number">
      </mat-form-field>

      <mat-form-field appearance="outline" class="dialog-input-field">
        <mat-label>Note</mat-label>
        <input matInput placeholder="Write a note" [formControl]="form.controls.notes">
      </mat-form-field>
    }
  </div>

  <div class="dialog-card-footer">
    <button type="submit" class="dialog-card-button dialog-card-button-primary" [disabled]="form.invalid">
      {{ data?.mode === 'edit'
        ? (data?.type === 'income' ? 'Update Income' : 'Update Transaction')
        : (data?.type === 'income' ? 'Save Income' : 'Save Transaction') }}
    </button>
    <button type="button" class="dialog-card-button dialog-card-button-secondary" (click)="close()">
      Cancel
    </button>
  </div>
</form>
